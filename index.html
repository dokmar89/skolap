<!DOCTYPE html>
<html lang="cs" class="antialiased">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Knowledge Base - Škola Populo</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          container: {
            center: true,
            padding: "2rem",
            screens: {
              "2xl": "1400px",
            },
          },
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            },
            colors: {
              border: "hsl(var(--border))",
              input: "hsl(var(--input))",
              ring: "hsl(var(--ring))",
              background: "hsl(var(--background))",
              foreground: "hsl(var(--foreground))",
              primary: {
                DEFAULT: "hsl(var(--primary))",
                foreground: "hsl(var(--primary-foreground))",
              },
              secondary: {
                DEFAULT: "hsl(var(--secondary))",
                foreground: "hsl(var(--secondary-foreground))",
              },
              destructive: {
                DEFAULT: "hsl(var(--destructive))",
                foreground: "hsl(var(--destructive-foreground))",
              },
              muted: {
                DEFAULT: "hsl(var(--muted))",
                foreground: "hsl(var(--muted-foreground))",
              },
              accent: {
                DEFAULT: "hsl(var(--accent))",
                foreground: "hsl(var(--accent-foreground))",
              },
              popover: {
                DEFAULT: "hsl(var(--popover))",
                foreground: "hsl(var(--popover-foreground))",
              },
              card: {
                DEFAULT: "hsl(var(--card))",
                foreground: "hsl(var(--card-foreground))",
              },
            },
            borderRadius: {
              lg: "var(--radius)",
              md: "calc(var(--radius) - 2px)",
              sm: "calc(var(--radius) - 4px)",
            },
          }
        }
      }
    </script>
    
    <style>
      :root {
        --background: 0 0% 100%;
        --foreground: 222.2 84% 4.9%;
        --card: 0 0% 100%;
        --card-foreground: 222.2 84% 4.9%;
        --popover: 0 0% 100%;
        --popover-foreground: 222.2 84% 4.9%;
        --primary: 220 70% 32%; /* Dark Blue */
        --primary-foreground: 210 40% 98%;
        --secondary: 210 40% 96.1%;
        --secondary-foreground: 222.2 47.4% 11.2%;
        --muted: 210 40% 96.1%;
        --muted-foreground: 215.4 16.3% 46.9%;
        --accent: 210 40% 96.1%;
        --accent-foreground: 222.2 47.4% 11.2%;
        --destructive: 0 84.2% 60.2%;
        --destructive-foreground: 210 40% 98%;
        --border: 214.3 31.8% 91.4%;
        --input: 214.3 31.8% 91.4%;
        --ring: 220 70% 32%;
        --radius: 0.5rem;
      }
     
      .dark {
        --background: 222.2 84% 4.9%;
        --foreground: 210 40% 98%;
        --card: 222.2 84% 4.9%;
        --card-foreground: 210 40% 98%;
        --popover: 222.2 84% 4.9%;
        --popover-foreground: 210 40% 98%;
        --primary: 220 70% 38%;
        --primary-foreground: 210 40% 98%;
        --secondary: 217.2 32.6% 17.5%;
        --secondary-foreground: 210 40% 98%;
        --muted: 217.2 32.6% 17.5%;
        --muted-foreground: 215 20.2% 65.1%;
        --accent: 217.2 32.6% 17.5%;
        --accent-foreground: 210 40% 98%;
        --destructive: 0 62.8% 30.6%;
        --destructive-foreground: 210 40% 98%;
        --border: 217.2 32.6% 17.5%;
        --input: 217.2 32.6% 17.5%;
        --ring: 220 70% 38%;
      }

      .prose,
      .article-content {
        max-width: 100%;
        color: hsl(var(--foreground));
      }

      .prose h1,
      .article-content h1 {
        font-size: 1.875rem;
        line-height: 2.25rem;
        font-weight: 700;
        letter-spacing: -0.025em;
        margin: 0 0 1rem;
        color: hsl(var(--foreground));
      }

      .prose h2,
      .article-content h2 {
        font-size: 1.5rem;
        line-height: 2rem;
        font-weight: 700;
        letter-spacing: -0.025em;
        margin: 2rem 0 1rem;
        color: hsl(var(--foreground));
      }

      .prose h3,
      .article-content h3 {
        font-size: 1.25rem;
        line-height: 1.75rem;
        font-weight: 700;
        margin: 1.5rem 0 0.75rem;
        color: hsl(var(--foreground));
      }

      .prose p,
      .article-content p {
        margin: 1rem 0;
        line-height: 1.8;
        color: hsl(var(--muted-foreground));
      }

      .prose a,
      .article-content a {
        color: hsl(var(--primary));
        text-decoration: underline;
        text-underline-offset: 4px;
        font-weight: 500;
      }

      .prose ul,
      .article-content ul {
        margin: 1.5rem 0 1.5rem 1.5rem;
        list-style: disc;
      }

      .prose ol,
      .article-content ol {
        margin: 1.5rem 0 1.5rem 1.5rem;
        list-style: decimal;
      }

      .prose li,
      .article-content li {
        margin-top: 0.5rem;
        color: hsl(var(--muted-foreground));
      }

      .prose blockquote,
      .article-content blockquote {
        margin: 1.5rem 0;
        padding-left: 1rem;
        border-left: 4px solid hsl(var(--primary) / 0.4);
        font-style: italic;
        color: hsl(var(--foreground) / 0.8);
      }

      .prose pre,
      .article-content pre {
        margin: 1.5rem 0;
        padding: 1rem;
        overflow-x: auto;
        border-radius: 0.75rem;
        background: rgb(15 23 42);
        color: rgb(241 245 249);
        font-size: 0.875rem;
      }

      .prose hr,
      .article-content hr {
        margin: 2rem 0;
        border: 0;
        border-top: 1px solid hsl(var(--border));
      }

      .prose table,
      .article-content table {
        width: 100%;
        border-collapse: collapse;
        margin: 1.5rem 0;
        font-size: 0.875rem;
      }

      .prose th,
      .article-content th {
        padding: 0.5rem;
        text-align: left;
        font-weight: 600;
        border: 1px solid hsl(var(--border));
        background: rgb(241 245 249);
      }

      .prose td,
      .article-content td {
        padding: 0.5rem;
        vertical-align: top;
        border: 1px solid hsl(var(--border));
      }

      .dark .prose th,
      .dark .article-content th {
        background: rgb(30 41 59);
      }

      .prose figure,
      .article-content figure {
        margin: 1.5rem 0;
      }

      .prose figcaption,
      .article-content figcaption {
        margin-top: 0.5rem;
        font-size: 0.75rem;
        color: hsl(var(--muted-foreground));
      }

      .rich-editor:empty::before {
        content: attr(data-placeholder);
        color: hsl(var(--muted-foreground));
        opacity: 0.8;
        pointer-events: none;
      }
    </style>
    
    <script type="importmap">
    {
      "imports": {
        "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
        "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
        "react/": "https://esm.sh/react@^19.2.4/",
        "react": "https://esm.sh/react@^19.2.4",
        "react-router-dom": "https://esm.sh/react-router-dom@^7.13.0",
        "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2"
      }
    }
    </script>
  <link rel="stylesheet" href="/index.css">
</head>
  <body class="min-h-screen bg-background font-sans antialiased text-foreground">
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
